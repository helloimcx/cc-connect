services:
  cc-connect:
    build:
      context: .
      dockerfile: Dockerfile
    image: cc-connect:bridge
    restart: unless-stopped
    command: ["-config", "/config/config.toml"]
    volumes:
      - ./config.toml:/config/config.toml:ro
      - ./workspace:/workspace
      - ./data:/root/.cc-connect
    ports:
      - "9810:9810"
      - "9820:9820"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9810/bridge/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
